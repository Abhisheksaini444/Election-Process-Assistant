<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Assistant - Your Election Guide</title>
    <meta name="description" content="An intelligent civic assistant designed to help you understand election processes in a simple, interactive, and structured way.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <div class="logo-container">
                <div class="logo-icon">🗳️</div>
                <div>
                    <h1>Civic Assistant</h1>
                    <p class="subtitle">Your personal election guide</p>
                </div>
            </div>
            <button id="reset-btn" class="icon-btn" title="Restart Conversation">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
        </header>

        <section class="chat-container" id="chat-container">
            <!-- Chat messages will be injected here -->
        </section>

        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
                <button id="send-btn" class="primary-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
            <div class="quick-replies" id="quick-replies">
                <!-- Quick reply buttons will be injected here -->
            </div>
        </footer>
    </main>
    <script src="script.js"></script>
</body>
</html>
