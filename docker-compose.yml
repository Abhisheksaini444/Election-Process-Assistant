services:
  backend:
    build:
      context: ./backend
    container_name: election-shield-backend
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000
    container_name: election-shield-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
